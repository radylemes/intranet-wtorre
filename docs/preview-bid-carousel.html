<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Preview — Carrossel BIDs Abertos · Intranet WTorre</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --wtorre: #1d54e6;
      --bid-raio: 16px;
      --texto: #1f2937;
      --texto-suave: #5b6472;
      --borda: #e7e9ee;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Hanken Grotesk', system-ui, sans-serif;
      color: var(--texto);
      background: #f6f7f9;
    }

    h1, h2, h3 { font-family: 'Archivo', sans-serif; }

    .pagina {
      max-width: 880px;
      margin: 0 auto;
      padding: 32px 16px 64px;
    }

    /* ===== Carrossel ===== */
    .bid-carousel { margin: 24px 0; }

    .bid-carousel__header { margin-bottom: 12px; }
    .bid-carousel__eyebrow {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--wtorre);
    }
    .bid-carousel__header h2 {
      margin: 2px 0 0;
      font-size: 22px;
      font-weight: 800;
    }

    .bid-carousel__viewport {
      position: relative;
      overflow: hidden;
      border-radius: var(--bid-raio);
    }

    .bid-carousel__track {
      display: flex;
      transition: transform 0.45s ease;
    }
    @media (prefers-reduced-motion: reduce) {
      .bid-carousel__track { transition: none; }
    }

    .bid-card {
      flex: 0 0 100%;
      display: grid;
      grid-template-columns: 380px 1fr;
      background: #fff;
      border: 1px solid var(--borda);
      border-radius: var(--bid-raio);
      overflow: hidden;
      min-height: 240px;
    }

    .bid-card__media { position: relative; }
    .bid-card__media .banner {
      width: 100%;
      height: 100%;
      display: block;
    }
    .bid-card__badge {
      position: absolute;
      top: 12px;
      left: 12px;
      background: #16a34a;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.06em;
      padding: 4px 10px;
      border-radius: 999px;
    }

    .bid-card__body {
      padding: 20px 24px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .bid-card__titulo {
      margin: 0;
      font-size: 19px;
      font-weight: 700;
      line-height: 1.25;
    }
    .bid-card__subtitulo {
      margin: 0;
      font-size: 13px;
      color: var(--texto-suave);
    }

    .bid-card__meta {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px 20px;
      font-size: 13px;
    }
    .bid-card__meta .label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #8a93a2;
    }

    .bid-card__stats {
      display: flex;
      gap: 8px;
      margin-top: 2px;
    }
    .stat {
      background: #f4f6fa;
      border-radius: 10px;
      padding: 8px 14px;
      text-align: center;
      min-width: 84px;
    }
    .stat strong {
      display: block;
      font-size: 17px;
      color: var(--wtorre);
      font-family: 'Archivo', sans-serif;
    }
    .stat span { font-size: 11px; color: var(--texto-suave); }

    .bid-card__footer {
      margin-top: auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
    }
    .bid-card__countdown {
      font-size: 13px;
      font-weight: 600;
      color: #374151;
    }
    .bid-card__countdown--urgente { color: #dc2626; }
    .bid-card__cta {
      background: var(--wtorre);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 22px;
      border-radius: 999px;
      transition: filter 0.15s ease;
    }
    .bid-card__cta:hover { filter: brightness(1.1); }

    .bid-carousel__nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.92);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      font-size: 20px;
      line-height: 1;
      cursor: pointer;
      color: var(--texto);
    }
    .bid-carousel__nav:focus-visible {
      outline: 2px solid var(--wtorre);
      outline-offset: 2px;
    }
    .bid-carousel__nav--prev { left: 12px; }
    .bid-carousel__nav--next { right: 12px; }

    .bid-carousel__dots {
      display: flex;
      justify-content: center;
      gap: 6px;
      margin-top: 10px;
    }
    .bid-carousel__dots button {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      border: none;
      background: #c7cdd8;
      cursor: pointer;
      padding: 0;
      transition: all 0.2s ease;
    }
    .bid-carousel__dots button.ativo {
      background: var(--wtorre);
      width: 20px;
      border-radius: 999px;
    }

    @media (max-width: 820px) {
      .bid-card { grid-template-columns: 1fr; }
      .bid-card__media .banner { height: 160px; }
    }
  </style>
</head>
<body>
  <div class="pagina">
    <section class="bid-carousel" id="bidCarousel" aria-label="BIDs abertos">
      <div class="bid-carousel__header">
        <span class="bid-carousel__eyebrow">■ PLATAFORMA BID</span>
        <h2>Partidas com apostas abertas</h2>
      </div>

      <div class="bid-carousel__viewport">
        <div class="bid-carousel__track" id="track"></div>
        <button class="bid-carousel__nav bid-carousel__nav--prev" id="btnPrev" aria-label="Evento anterior">‹</button>
        <button class="bid-carousel__nav bid-carousel__nav--next" id="btnNext" aria-label="Próximo evento">›</button>
      </div>

      <div class="bid-carousel__dots" id="dots" role="tablist"></div>
    </section>
  </div>

  <script>
    // ===== Mock: mesmo formato retornado pelo proxy /api/bid/eventos-abertos =====
    const agora = Date.now();
    const h = 3600000;
    const MOCK = {
      gerado_em: new Date().toISOString(),
      eventos: [
        {
          id: 12,
          titulo: 'Palmeiras x Corinthians — Dérbi Paulista',
          subtitulo: 'Campeonato Brasileiro · Rodada 15',
          local: 'Nubank Parque',
          imagem_url: null,
          data_jogo: new Date(agora + 72 * h).toISOString(),
          data_limite_aposta: new Date(agora + 50 * h).toISOString(),
          quantidade_premios: 4,
          setor_evento_nome: 'Gol Norte',
          total_apostas: 87,
          total_participantes: 52,
          gradiente: ['#1d54e6', '#0d2f8f']
        },
        {
          id: 13,
          titulo: 'Palmeiras x Flamengo',
          subtitulo: 'Copa do Brasil · Quartas de final',
          local: 'Nubank Parque',
          imagem_url: null,
          data_jogo: new Date(agora + 30 * h).toISOString(),
          data_limite_aposta: new Date(agora + 2.5 * h).toISOString(),
          quantidade_premios: 2,
          setor_evento_nome: 'Central Leste',
          total_apostas: 143,
          total_participantes: 98,
          gradiente: ['#820ad1', '#4a0680']
        },
        {
          id: 14,
          titulo: 'Show — Turnê Internacional 2026',
          subtitulo: 'Evento especial · Camarote corporativo',
          local: 'Nubank Parque',
          imagem_url: null,
          data_jogo: new Date(agora + 120 * h).toISOString(),
          data_limite_aposta: new Date(agora + 96 * h).toISOString(),
          quantidade_premios: 6,
          setor_evento_nome: 'Camarote WTorre',
          total_apostas: 34,
          total_participantes: 29,
          gradiente: ['#0ea5a4', '#065f5e']
        }
      ]
    };

    const AUTOPLAY_MS = 6000;
    let indice = 0;
    let autoplayId = null;

    const track = document.getElementById('track');
    const dots = document.getElementById('dots');

    const fmtData = (iso) =>
      new Date(iso).toLocaleString('pt-BR', {
        weekday: 'short', day: '2-digit', month: 'short',
        hour: '2-digit', minute: '2-digit'
      });

    function tempoRestante(iso) {
      const diff = new Date(iso).getTime() - Date.now();
      if (diff <= 0) return { texto: 'instantes', urgente: true };
      const min = Math.floor(diff / 60000);
      const hrs = Math.floor(min / 60);
      const dias = Math.floor(hrs / 24);
      if (dias >= 1) return { texto: `${dias}d ${hrs % 24}h`, urgente: false };
      if (hrs >= 1) return { texto: `${hrs}h ${min % 60}min`, urgente: hrs < 3 };
      return { texto: `${min}min`, urgente: true };
    }

    function bannerSvg(ev) {
      // Placeholder quando imagem_url é null — em produção usa <img src="imagem_url">
      const [c1, c2] = ev.gradiente;
      return `
        <svg class="banner" viewBox="0 0 380 240" preserveAspectRatio="xMidYMid slice" role="img" aria-label="${ev.titulo}">
          <defs>
            <linearGradient id="g${ev.id}" x1="0" y1="0" x2="1" y2="1">
              <stop offset="0" stop-color="${c1}"/><stop offset="1" stop-color="${c2}"/>
            </linearGradient>
          </defs>
          <rect width="380" height="240" fill="url(#g${ev.id})"/>
          <circle cx="320" cy="40" r="90" fill="#ffffff" opacity="0.08"/>
          <circle cx="40" cy="210" r="70" fill="#ffffff" opacity="0.08"/>
          <text x="24" y="210" font-family="Archivo, sans-serif" font-size="15" font-weight="800"
                fill="#ffffff" opacity="0.9" letter-spacing="2">BID · NUBANK PARQUE</text>
        </svg>`;
    }

    function render() {
      track.innerHTML = MOCK.eventos.map((ev) => {
        const restante = ev.data_limite_aposta ? tempoRestante(ev.data_limite_aposta) : null;
        return `
        <article class="bid-card">
          <div class="bid-card__media">
            ${ev.imagem_url
              ? `<img class="banner" src="${ev.imagem_url}" alt="${ev.titulo}" loading="lazy" style="object-fit:cover"/>`
              : bannerSvg(ev)}
            <span class="bid-card__badge">ABERTA</span>
          </div>
          <div class="bid-card__body">
            <h3 class="bid-card__titulo">${ev.titulo}</h3>
            ${ev.subtitulo ? `<p class="bid-card__subtitulo">${ev.subtitulo}</p>` : ''}
            <ul class="bid-card__meta">
              <li><span class="label">Jogo</span><span>${fmtData(ev.data_jogo)}</span></li>
              <li><span class="label">Local</span><span>${ev.local}</span></li>
              <li><span class="label">Setor</span><span>${ev.setor_evento_nome}</span></li>
            </ul>
            <div class="bid-card__stats">
              <div class="stat"><strong>${ev.quantidade_premios}</strong><span>${ev.quantidade_premios === 1 ? 'ingresso' : 'ingressos'}</span></div>
              <div class="stat"><strong>${ev.total_apostas}</strong><span>lances</span></div>
              <div class="stat"><strong>${ev.total_participantes}</strong><span>participantes</span></div>
            </div>
            <div class="bid-card__footer">
              ${restante ? `<span class="bid-card__countdown ${restante.urgente ? 'bid-card__countdown--urgente' : ''}">⏱ Encerra em ${restante.texto}</span>` : ''}
              <a class="bid-card__cta" href="#partida-${ev.id}">Fazer meu lance</a>
            </div>
          </div>
        </article>`;
      }).join('');

      dots.innerHTML = MOCK.eventos.map((ev, i) =>
        `<button role="tab" aria-selected="${i === indice}" class="${i === indice ? 'ativo' : ''}"
                 aria-label="Ir para o evento ${i + 1}" data-i="${i}"></button>`
      ).join('');
    }

    function atualizar() {
      track.style.transform = `translateX(-${indice * 100}%)`;
      dots.querySelectorAll('button').forEach((b, i) => {
        b.classList.toggle('ativo', i === indice);
        b.setAttribute('aria-selected', String(i === indice));
      });
    }

    const proximo = () => { indice = (indice + 1) % MOCK.eventos.length; atualizar(); };
    const anterior = () => { indice = (indice - 1 + MOCK.eventos.length) % MOCK.eventos.length; atualizar(); };
    const pausar = () => { if (autoplayId) { clearInterval(autoplayId); autoplayId = null; } };
    const retomar = () => { pausar(); autoplayId = setInterval(proximo, AUTOPLAY_MS); };

    document.getElementById('btnNext').addEventListener('click', proximo);
    document.getElementById('btnPrev').addEventListener('click', anterior);
    dots.addEventListener('click', (e) => {
      const b = e.target.closest('button[data-i]');
      if (b) { indice = Number(b.dataset.i); atualizar(); }
    });

    const carousel = document.getElementById('bidCarousel');
    carousel.addEventListener('mouseenter', pausar);
    carousel.addEventListener('mouseleave', retomar);

    render();
    retomar();
    // Countdown atualizado a cada 30s (re-renderiza mantendo o slide atual)
    setInterval(() => { render(); atualizar(); }, 30000);
  </script>
</body>
</html>
