<div class="topbar">
  <div class="wrap topbar-row">
    <div class="grupo-logos" aria-label="Empresas do grupo">
      @for (logo of logos; track logo.id) {
        <img
          [src]="logo.logoSrc"
          [alt]="logo.alt"
          [title]="logo.nome"
          class="grupo-logo logo-{{ logo.id }}"
          loading="lazy"
        />
      }
    </div>

    <span class="suporte">CCO: Ramal 6673 TEL.: (11) 4800 - 6673</span>
  </div>
</div>
