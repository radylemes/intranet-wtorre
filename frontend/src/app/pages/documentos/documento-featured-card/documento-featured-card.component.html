<div class="feature">
  <app-documento-gencover
    variant="feature"
    [titulo]="documento.titulo"
    [extensao]="documento.extensao"
    [iconeCategoria]="iconeCategoria"
    [kicker]="kicker"
    [tags]="documento.setor?.nome ?? ''"
    [thumbUrl]="capaUrl()"
    [aguardandoThumb]="thumbCarregando()"
  />
  <div class="finfo">
    <div class="badges">
      @if (setorLabel()) {
        <span class="chip dot" [class]="setorChipClass()">{{ setorLabel() }}</span>
      }
      <span class="chip" [class]="extChipClass()">{{ extLabel() }}</span>
    </div>
    <h2 [appTextTooltip]="documento.titulo">{{ documento.titulo }}</h2>
    @if (documento.descricao) {
      <p class="desc" [appTextTooltip]="documento.descricao">{{ documento.descricao }}</p>
    }
    <div class="meta">
      @for (parte of metaPartes(); track parte; let last = $last) {
        <span>{{ parte }}</span>
        @if (!last) {
          <span class="sep"></span>
        }
      }
    </div>
    <div class="actions">
      <button type="button" class="btn btn-primary" (click)="onVisualizar($event)">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" stroke="currentColor" stroke-width="2" />
          <circle cx="12" cy="12" r="3" stroke="currentColor" stroke-width="2" />
        </svg>
        Visualizar
      </button>
      <button type="button" class="btn btn-ghost" (click)="onBaixar($event)">
        <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M12 3v12m0 0l-4-4m4 4l4-4M4 21h16"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
        Baixar
      </button>
    </div>
  </div>
</div>
