@for (item of items(); track item.id) {
  <div class="cat-branch">
    <div class="cat" [class.on]="selecionadaId() === item.id">
      <button type="button" class="cat-select" (click)="action.emit({ type: 'select', item })">
        <span class="cic">
          <app-doc-cat-icone [nome]="iconFor(item)" [size]="16" />
        </span>
        <span class="cn">{{ item.nome }}</span>
        @if (item.documentos_count != null) {
          <span class="cc">{{ item.documentos_count }}</span>
        }
        @if (!item.ativo) {
          <span class="cat-inativo">inativo</span>
        }
      </button>
      <span class="cacts">
        <button
          type="button"
          class="ci"
          title="Editar"
          (click)="action.emit({ type: 'edit', item }); $event.stopPropagation()"
        >
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M4 20h4l10-10-4-4L4 16z"
              stroke="currentColor"
              stroke-width="2"
              stroke-linejoin="round"
            />
          </svg>
        </button>
        <button
          type="button"
          class="ci del"
          title="Remover"
          (click)="action.emit({ type: 'remove', item }); $event.stopPropagation()"
        >
          <svg viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M6 7h12M9 7V5h6v2M7 7l1 13h8l1-13"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </button>
      </span>
    </div>

    @if (item.children.length) {
      <div class="cat-children">
        <app-doc-admin-node
          [items]="item.children"
          [depth]="depth() + 1"
          [selecionadaId]="selecionadaId()"
          [parentIcon]="childParentIcon(item)"
          (action)="action.emit($event)"
        />
      </div>
    }
  </div>
}
