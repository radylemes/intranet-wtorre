@for (item of items(); track item.id) {
  <div class="cat-branch">
    <div class="cat-item" [class.selected]="selecionadaId() === item.id">
      <button
        type="button"
        class="cat-item-main"
        (click)="action.emit({ type: 'select', item })"
      >
        <span class="cat-icon-wrap" [attr.data-icon]="iconFor(item)">
          @switch (iconFor(item)) {
            @case ('shield') {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M12 3l8 3v6c0 5-3.5 8.5-8 9-4.5-.5-8-4-8-9V6l8-3z"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linejoin="round"
                />
              </svg>
            }
            @case ('file') {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M8 4h6l4 4v12a2 2 0 01-2 2H8a2 2 0 01-2-2V6a2 2 0 012-2z"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linejoin="round"
                />
                <path d="M14 4v4h4" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round" />
              </svg>
            }
            @case ('brand') {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="12" cy="12" r="8" stroke="currentColor" stroke-width="1.6" />
                <path d="M12 8v8M8 12h8" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
              </svg>
            }
            @case ('cap') {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M4 10l8-4 8 4-8 4-8-4zM6 12v4c0 1 2.5 2 6 2s6-1 6-2v-4"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linejoin="round"
                />
              </svg>
            }
            @default {
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M3 7a2 2 0 012-2h5l2 2h9a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"
                  stroke="currentColor"
                  stroke-width="1.6"
                  stroke-linejoin="round"
                />
              </svg>
            }
          }
        </span>
        <span class="cat-name">{{ item.nome }}</span>
        @if (item.documentos_count != null) {
          <span class="cat-badge">{{ item.documentos_count }}</span>
        }
        @if (!item.ativo) {
          <span class="cat-inativo">inativo</span>
        }
      </button>
      @if (selecionadaId() === item.id) {
        <div class="cat-node-actions">
          <button
            type="button"
            class="iconbtn"
            title="Editar"
            (click)="action.emit({ type: 'edit', item }); $event.stopPropagation()"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 20h9M16.5 3.5a2.12 2.12 0 013 3L7 19l-4 1 1-4 12.5-12.5z"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
          <button
            type="button"
            class="iconbtn del"
            title="Remover"
            (click)="action.emit({ type: 'remove', item }); $event.stopPropagation()"
          >
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M3 6h18M8 6V4h8v2M6 6l1 14h10l1-14"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
          </button>
        </div>
      }
    </div>

    @if (item.children.length) {
      <div class="cat-children">
        <app-doc-admin-node
          [items]="item.children"
          [depth]="depth() + 1"
          [selecionadaId]="selecionadaId()"
          [parentIcon]="childParentIcon(item)"
          (action)="action.emit($event)"
        />
      </div>
    }
  </div>
}
