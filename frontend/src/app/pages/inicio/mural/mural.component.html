<div>
  <div class="block-head mural-head">
    <div>
      <div class="tag">Mural</div>
    </div>
  </div>

  <div class="mural-grid">
    <div class="mural-col">
      <h2 class="titulo-menor col-title">Comunicados</h2>
      <div class="panel-card">
        @for (n of noticias(); track n.id) {
          <div class="news-item">
            <div class="date">
              <div class="d">{{ n.dia }}</div>
              <div class="m">{{ n.mes }}</div>
            </div>
            <div class="body">
              <div class="cat" [style.color]="n.categoriaCor">{{ n.categoriaLabel }}</div>
              <div class="t">{{ n.titulo }}</div>
            </div>
          </div>
        }
      </div>
    </div>

    <div class="mural-col">
      <h2 class="titulo-menor col-title">Próximos eventos</h2>
      <div class="panel-card">
        @for (ev of eventos; track ev.titulo) {
          <div class="event">
            <span class="ev-ic">{{ ev.emoji }}</span>
            <div>
              <div class="ev-t">{{ ev.titulo }}</div>
              <div class="ev-s">{{ ev.subtitulo }}</div>
            </div>
            <span class="ev-tag">{{ ev.tag }}</span>
          </div>
        }
      </div>
    </div>
  </div>
</div>
