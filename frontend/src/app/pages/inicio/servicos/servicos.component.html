<section class="block" appRevealOnScroll>
  <div class="wrap">
    <div class="block-head">
      <div>
        <div class="tag">Serviços</div>
        <h2>Resolva agora</h2>
      </div>
    </div>
    <div class="tools">
      @for (s of servicos; track s.titulo) {
        <div class="tool">
          <svg class="arr" width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path
              d="M7 17L17 7M17 7H9M17 7v8"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <div class="t-ic">
            <app-servico-icon [icon]="s.icon" />
          </div>
          <h3>{{ s.titulo }}</h3>
          <p>{{ s.desc }}</p>
        </div>
      }
    </div>
  </div>
</section>
