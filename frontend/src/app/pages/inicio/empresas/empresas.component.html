<section class="block" appRevealOnScroll>
  <div class="wrap">
    <div class="block-head">
      <div>
        <div class="tag">As empresas do grupo</div>
        <h2>Acesse seu ambiente</h2>
      </div>
      <a class="more" href="#" (click)="$event.preventDefault()">
        Ver organograma
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" aria-hidden="true">
          <path
            d="M5 12h14M13 6l6 6-6 6"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </a>
    </div>

    <div class="companies">
      @for (emp of empresas; track emp.id) {
        <app-company-card [empresa]="emp" />
      }
    </div>
  </div>
</section>
