<div class="pagina">
  <app-public-chrome>
    <div class="wrap conteudo">
      <header class="head">
        <div>
          <h1>Camarotes</h1>
          <div class="sync">
            <span class="dot"></span>
            <span>
              Sincronizado com a planilha do SharePoint · atualizado em
              <time>{{ ultimaSyncLabel() }}</time>
            </span>
          </div>
        </div>
        @if (podeAdmin()) {
          <div class="actions">
            <a routerLink="/admin/camarotes" class="btn btn-ghost">Configurar</a>
            <button
              type="button"
              class="btn btn-primary"
              [disabled]="sincronizando()"
              (click)="sincronizar()"
            >
              {{ sincronizando() ? 'Sincronizando…' : 'Sincronizar agora' }}
            </button>
          </div>
        }
      </header>

      @if (carregando() && !dashboard()) {
        <p class="empty">Carregando dashboard…</p>
      }

      @if (erro()) {
        <p class="erro">{{ erro() }}</p>
      }

      @if (dashboard(); as d) {
        <app-camarotes-dashboard [dashboard]="d" />
      }
    </div>
  </app-public-chrome>

  <app-footer />
</div>
