<!-- Referência visual estática; implementação em src/app/pages/treinamentos/ -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Treinamentos · Intranet Grupo WTorre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@600;700;800;900&family=Archivo+Expanded:wght@800&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4f5f8;--panel:#fff;--panel-2:#f6f8fc;--line:#e4e8f0;--line-solid:#e2e6ee;
    --ink:#10151f;--ink-soft:#48536a;--ink-dim:#8a93a8;
    --wtorre:#1d54e6;--nubank:#8a05be;--base:#0e8da0;--novo:#1a1a1a;--green:#1c9e62;--gold:#e0a52e;--rose:#d8456e;
    --radius:16px;--shadow:0 12px 30px -22px rgba(28,42,82,.3);font-synthesis:none;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:radial-gradient(1100px 500px at 88% -10%,rgba(29,84,230,.10),transparent 60%),linear-gradient(180deg,#eef1f6,#f4f5f8 38%);color:var(--ink);font-family:'Hanken Grotesk',system-ui,sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1280px;margin:0 auto;padding:0 28px}
  body::before{content:"";position:fixed;inset:0;pointer-events:none;z-index:0;background-image:linear-gradient(rgba(29,54,110,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(29,54,110,.04) 1px,transparent 1px);background-size:54px 54px;mask-image:radial-gradient(ellipse 100% 80% at 50% 0%,#000,transparent 75%)}

  .topbar{position:relative;z-index:30;border-bottom:1px solid var(--line-solid);background:rgba(255,255,255,.7);backdrop-filter:blur(10px)}
  .topbar .wrap{display:flex;align-items:center;justify-content:space-between;height:42px;font-size:12.5px;color:var(--ink-dim)}
  .live{display:inline-flex;align-items:center;gap:7px}.dot{width:7px;height:7px;border-radius:50%;background:var(--green)}.topbar b{color:var(--ink-soft);font-weight:600}

  header.main{position:sticky;top:0;z-index:25;background:rgba(255,255,255,.85);backdrop-filter:blur(16px);border-bottom:1px solid var(--line-solid)}
  .navrow{display:flex;align-items:center;gap:30px;height:72px}
  .brandmark{display:flex;align-items:center;gap:12px;flex-shrink:0}
  .logo-w{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;background:linear-gradient(140deg,#2f6bff,#173a8f);box-shadow:0 8px 22px -8px rgba(47,107,255,.6)}
  .logo-w svg{width:24px;height:24px}
  .brandmark .grp{font-family:'Archivo Expanded','Archivo',sans-serif;font-weight:800;font-size:18px}
  .brandmark .sub{font-size:10px;letter-spacing:.32em;color:var(--ink-dim);text-transform:uppercase;margin-top:3px}
  nav.menu{display:flex;align-items:center;gap:2px;flex:1}
  nav.menu a{padding:9px 13px;border-radius:10px;font-size:13.5px;font-weight:600;color:var(--ink-soft);transition:.18s;white-space:nowrap}
  nav.menu a:hover{color:var(--ink);background:rgba(29,84,230,.06)}
  nav.menu a.active{color:var(--wtorre);background:rgba(29,84,230,.08)}
  .avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#eef2fb,#dce3f2);border:1px solid var(--line-solid);display:grid;place-items:center;font-weight:700;font-size:12px;color:var(--wtorre)}

  .page-head{position:relative;z-index:5;padding:34px 0 12px}
  .crumb{font-size:12.5px;color:var(--ink-dim);margin-bottom:14px}.crumb span{color:var(--ink)}
  .ph-row{display:flex;align-items:center;gap:16px}
  .headic{width:56px;height:56px;border-radius:16px;background:linear-gradient(140deg,#2f6bff,#173a8f);display:grid;place-items:center;box-shadow:0 12px 26px -12px rgba(47,107,255,.6);flex-shrink:0}
  .headic svg{width:28px;height:28px}
  .page-head h1{font-family:'Archivo Expanded','Archivo',sans-serif;font-weight:800;font-size:34px;letter-spacing:-.02em}
  .page-head p{margin-top:7px;font-size:14.5px;color:var(--ink-soft)}

  /* toolbar */
  .toolbar{position:relative;z-index:5;display:flex;gap:14px;align-items:center;margin:20px 0 6px;flex-wrap:wrap}
  .search{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--line-solid);border-radius:12px;padding:0 16px;height:48px;flex:1;min-width:240px;box-shadow:var(--shadow)}
  .search svg{width:18px;height:18px;color:var(--ink-dim)}
  .search input{flex:1;border:none;outline:none;background:none;font-family:inherit;font-size:14.5px;color:var(--ink)}

  .chips{position:relative;z-index:5;display:flex;gap:9px;flex-wrap:wrap;margin:10px 0 4px}
  .chip{font-size:12.5px;font-weight:600;color:var(--ink-soft);background:var(--panel);border:1px solid var(--line-solid);border-radius:30px;padding:8px 15px;cursor:pointer;transition:.15s;display:inline-flex;align-items:center;gap:8px}
  .chip:hover{border-color:var(--ink-dim)}
  .chip .cd{width:8px;height:8px;border-radius:50%}
  .chip.active{color:#fff;border-color:transparent;background:var(--ink)}

  .sec-label{position:relative;z-index:5;font-family:'Archivo',sans-serif;font-weight:700;font-size:13px;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-dim);margin:22px 0 14px;display:flex;align-items:center;gap:10px}
  .sec-label .ct{font-weight:600;color:var(--ink-dim);font-size:12px;background:var(--panel);border:1px solid var(--line-solid);border-radius:20px;padding:1px 9px;text-transform:none;letter-spacing:0}

  /* destaque */
  .featured{position:relative;z-index:5;display:grid;grid-template-columns:1.4fr 1fr;gap:0;background:var(--panel);border:1px solid var(--line-solid);border-radius:20px;overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px;cursor:pointer;transition:.2s}
  .featured:hover{box-shadow:0 24px 50px -28px rgba(28,42,82,.45);transform:translateY(-2px)}
  .featured .thumb{aspect-ratio:16/9}
  .featured .meta{padding:26px 28px;display:flex;flex-direction:column;justify-content:center}
  .featured .meta .tagrow{display:flex;gap:8px;margin-bottom:12px}
  .featured .meta h2{font-family:'Archivo',sans-serif;font-weight:800;font-size:23px;line-height:1.2;letter-spacing:-.01em}
  .featured .meta p{margin-top:10px;font-size:14px;color:var(--ink-soft);line-height:1.5}
  .featured .meta .info{margin-top:16px;font-size:12.5px;color:var(--ink-dim);display:flex;gap:14px;align-items:center}

  /* grid */
  .grid{position:relative;z-index:5;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px;padding-bottom:60px}
  .vcard{background:var(--panel);border:1px solid var(--line-solid);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);cursor:pointer;transition:.2s}
  .vcard:hover{transform:translateY(-4px);box-shadow:0 24px 48px -28px rgba(28,42,82,.45)}
  .vcard:hover .thumb .play{transform:scale(1.08);background:rgba(255,255,255,.28)}
  .thumb{position:relative;aspect-ratio:16/9;display:grid;place-items:center;overflow:hidden}
  .thumb::after{content:"";position:absolute;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,255,255,.18),transparent 55%)}
  .thumb .cat{position:absolute;top:10px;left:10px;z-index:2;font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#fff;background:rgba(0,0,0,.32);backdrop-filter:blur(4px);padding:4px 9px;border-radius:20px}
  .thumb .dur{position:absolute;bottom:10px;right:10px;z-index:2;font-size:11px;font-weight:700;color:#fff;background:rgba(0,0,0,.6);padding:3px 8px;border-radius:6px}
  .thumb .play{position:relative;z-index:2;width:54px;height:54px;border-radius:50%;background:rgba(255,255,255,.18);backdrop-filter:blur(3px);border:1.5px solid rgba(255,255,255,.5);display:grid;place-items:center;transition:.2s}
  .thumb .play svg{width:22px;height:22px;margin-left:3px}
  .vbody{padding:14px 15px 16px}
  .vbody h3{font-size:15px;font-weight:700;line-height:1.25;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .vbody .vmeta{margin-top:9px;font-size:12px;color:var(--ink-dim);display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .vbody .vmeta .area{color:var(--ink-soft);font-weight:600}
  .novo{font-size:9px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--green);background:rgba(28,158,98,.12);padding:2px 7px;border-radius:20px}

  .empty{grid-column:1/-1;text-align:center;padding:60px;color:var(--ink-dim)}

  /* player modal */
  .overlay{position:fixed;inset:0;z-index:60;background:rgba(8,12,20,.7);backdrop-filter:blur(6px);display:none;place-items:center;padding:24px}
  .overlay.open{display:grid}
  .player{width:min(860px,100%);background:var(--panel);border-radius:18px;overflow:hidden;box-shadow:0 40px 90px -30px rgba(0,0,0,.7);animation:pop .25s cubic-bezier(.2,.8,.3,1)}
  @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.98)}to{opacity:1;transform:none}}
  .stage{position:relative;aspect-ratio:16/9;display:grid;place-items:center}
  .stage .bigplay{width:74px;height:74px;border-radius:50%;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.6);display:grid;place-items:center;cursor:pointer;transition:.2s}
  .stage .bigplay:hover{background:rgba(255,255,255,.34);transform:scale(1.06)}
  .stage .bigplay svg{width:30px;height:30px;margin-left:4px}
  .stage .closex{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.45);border:none;display:grid;place-items:center;cursor:pointer;color:#fff;z-index:3}
  .stage .closex svg{width:18px;height:18px}
  .ctrlbar{position:absolute;left:0;right:0;bottom:0;padding:14px 16px;background:linear-gradient(0deg,rgba(0,0,0,.55),transparent);display:flex;align-items:center;gap:12px;color:#fff}
  .ctrlbar svg{width:18px;height:18px;cursor:pointer;opacity:.9}
  .ctrlbar .track{flex:1;height:4px;border-radius:4px;background:rgba(255,255,255,.3);position:relative}
  .ctrlbar .track::before{content:"";position:absolute;left:0;top:0;bottom:0;width:22%;background:#fff;border-radius:4px}
  .ctrlbar .tmark{font-size:11px;font-weight:600;opacity:.9}
  .pbody{padding:20px 24px 24px}
  .pbody .tagrow{display:flex;gap:8px;margin-bottom:10px}
  .pbody h2{font-family:'Archivo',sans-serif;font-weight:800;font-size:20px;line-height:1.25}
  .pbody p{margin-top:10px;font-size:14px;color:var(--ink-soft);line-height:1.55}
  .pbody .info{margin-top:14px;padding-top:14px;border-top:1px solid var(--line);font-size:12.5px;color:var(--ink-dim);display:flex;gap:18px;flex-wrap:wrap}
  .pbody .info b{color:var(--ink-soft);font-weight:600}

  .tag{font-size:10px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:#fff;padding:4px 10px;border-radius:20px}

  @media(max-width:780px){.wrap{padding:0 16px}nav.menu{display:none}.featured{grid-template-columns:1fr}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="topbar"><div class="wrap">
  <span class="live"><span class="dot"></span><b>Sistemas operando normalmente</b></span>
  <span>Central de Treinamentos</span>
</div></div>

<header class="main"><div class="wrap navrow">
  <a href="#" class="brandmark"><span class="logo-w"><svg viewBox="0 0 24 24" fill="none"><path d="M2 4l3 16 4-11 4 11 3-16" stroke="#fff" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/><circle cx="19.5" cy="6" r="2.2" fill="#fff"/></svg></span><span><div class="grp">GRUPO WTORRE</div><div class="sub">Intranet Corporativa</div></span></a>
  <nav class="menu"><a>Início</a><a>Documentos</a><a>Ramais</a><a>Aniversariantes</a><a class="active">Treinamentos</a><a>TI</a><a>BI</a></nav>
  <div class="avatar">AI</div>
</div></header>

<div class="page-head"><div class="wrap">
  <div class="crumb">Início › <span>Treinamentos</span></div>
  <div class="ph-row">
    <span class="headic"><svg viewBox="0 0 24 24" fill="none"><path d="M3 9l9-5 9 5-9 5-9-5z" stroke="#fff" stroke-width="2" stroke-linejoin="round"/><path d="M7 11.5V16c2.5 1.6 7.5 1.6 10 0v-4.5" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M21 9v5" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></span>
    <div>
      <h1>Treinamentos</h1>
      <p>Vídeos de capacitação, onboarding e procedimentos do Grupo WTorre.</p>
    </div>
  </div>
</div></div>

<div class="wrap">
  <div class="toolbar">
    <div class="search"><svg viewBox="0 0 24 24" fill="none"><circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/><path d="M21 21l-4-4" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg><input id="q" type="text" placeholder="Buscar treinamento por título, tema ou área..."></div>
  </div>
  <div class="chips" id="chips"></div>

  <div class="sec-label">Em destaque</div>
  <div id="featured"></div>

  <div class="sec-label">Todos os treinamentos <span class="ct" id="contador"></span></div>
  <div class="grid" id="grid"></div>
</div>

<!-- player -->
<div class="overlay" id="overlay">
  <div class="player">
    <div class="stage" id="stage">
      <button class="closex" id="closeX"><svg viewBox="0 0 24 24" fill="none"><path d="M6 6l12 12M18 6L6 18" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg></button>
      <div class="bigplay"><svg viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg></div>
      <div class="ctrlbar">
        <svg viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
        <span class="tmark">0:42</span>
        <div class="track"></div>
        <span class="tmark" id="ptotal">12:30</span>
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
    </div>
    <div class="pbody">
      <div class="tagrow" id="ptags"></div>
      <h2 id="ptitle"></h2>
      <p id="pdesc"></p>
      <div class="info" id="pinfo"></div>
    </div>
  </div>
</div>

<script>
  const CAT = {
    onboarding: { label: 'Onboarding',   cor: '#1d54e6', grad: 'linear-gradient(135deg,#2f6bff,#15308f)' },
    compliance: { label: 'Compliance',   cor: '#8a05be', grad: 'linear-gradient(135deg,#a23bd6,#5e0a85)' },
    ti:         { label: 'TI & Sistemas',cor: '#0e8da0', grad: 'linear-gradient(135deg,#15a8bd,#0a5e6c)' },
    seguranca:  { label: 'Segurança',    cor: '#e0a52e', grad: 'linear-gradient(135deg,#eab43f,#b9791a)' },
    operacoes:  { label: 'Operações',    cor: '#1c9e62', grad: 'linear-gradient(135deg,#27b873,#127a4a)' },
    rh:         { label: 'RH',           cor: '#d8456e', grad: 'linear-gradient(135deg,#e85f86,#a92750)' },
  };

  const VIDEOS = [
    { t:'Boas-vindas ao Grupo WTorre', cat:'onboarding', dur:'08:12', area:'RH', novo:true,
      desc:'Conheça a história, as empresas e a cultura do grupo. Vídeo obrigatório para novos colaboradores na primeira semana.' },
    { t:'Código de Conduta e Ética', cat:'compliance', dur:'14:30', area:'Compliance', novo:true,
      desc:'Princípios de integridade, conflito de interesses e canais de denúncia. Treinamento anual obrigatório.' },
    { t:'LGPD na prática do dia a dia', cat:'compliance', dur:'11:05', area:'Jurídico',
      desc:'Como tratar dados pessoais com segurança no seu trabalho: coleta, armazenamento e descarte.' },
    { t:'Primeiros passos no Portal RH', cat:'ti', dur:'06:48', area:'Tecnologia',
      desc:'Acesse holerite, solicite férias e atualize seus dados no Portal RH (Mega).' },
    { t:'Como abrir um chamado de TI', cat:'ti', dur:'04:22', area:'Tecnologia', novo:true,
      desc:'Passo a passo para registrar solicitações e acompanhar o atendimento da equipe de TI.' },
    { t:'Uso correto de EPIs', cat:'seguranca', dur:'09:55', area:'Segurança do Trabalho',
      desc:'Equipamentos de proteção individual: quando, como e por que usar em cada área da operação.' },
    { t:'Prevenção e combate a incêndio', cat:'seguranca', dur:'17:40', area:'Segurança do Trabalho',
      desc:'Rotas de fuga, uso de extintores e procedimentos de evacuação na arena e nos escritórios.' },
    { t:'Protocolo operacional de eventos', cat:'operacoes', dur:'21:15', area:'Operações',
      desc:'Fluxo completo de um dia de evento na Nubank Parque: montagem, público, segurança e desmonte.' },
    { t:'Atendimento ao público e patrocinadores', cat:'operacoes', dur:'10:30', area:'Comercial',
      desc:'Padrão de hospitalidade e atendimento para camarotes, patrocinadores e visitantes.' },
    { t:'Benefícios: como acessar e usar', cat:'rh', dur:'07:18', area:'RH',
      desc:'Plano de saúde, vale-refeição, gympass e demais benefícios — onde consultar e como solicitar.' },
  ];

  const $ = id => document.getElementById(id);
  let catFiltro = '', q = '';

  // chips
  const chipsEl = $('chips');
  const chipAll = document.createElement('span');
  chipAll.className = 'chip active'; chipAll.textContent = 'Todas as categorias'; chipAll.dataset.cat = '';
  chipsEl.appendChild(chipAll);
  Object.entries(CAT).forEach(([k, c]) => {
    const el = document.createElement('span');
    el.className = 'chip'; el.dataset.cat = k;
    el.innerHTML = `<span class="cd" style="background:${c.cor}"></span>${c.label}`;
    chipsEl.appendChild(el);
  });
  chipsEl.querySelectorAll('.chip').forEach(c => c.onclick = () => {
    chipsEl.querySelectorAll('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active'); catFiltro = c.dataset.cat; render();
  });

  function thumb(v, cls) {
    const c = CAT[v.cat];
    return `<div class="thumb ${cls||''}" style="background:${c.grad}">
      <span class="cat">${c.label}</span>
      <span class="dur">${v.dur}</span>
      <span class="play"><svg viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg></span>
    </div>`;
  }

  function render() {
    const f = q.trim().toLowerCase();
    const lista = VIDEOS.filter(v => {
      if (catFiltro && v.cat !== catFiltro) return false;
      if (f && !(`${v.t} ${v.area} ${CAT[v.cat].label} ${v.desc}`.toLowerCase().includes(f))) return false;
      return true;
    });

    // destaque (primeiro com novo, senão primeiro da lista)
    const fe = $('featured');
    const dest = lista.find(v => v.novo) || lista[0];
    if (dest) {
      const c = CAT[dest.cat];
      fe.style.display = '';
      fe.innerHTML = `<div class="featured" data-t="${dest.t}">
        ${thumb(dest)}
        <div class="meta">
          <div class="tagrow"><span class="tag" style="background:${c.cor}">${c.label}</span>${dest.novo?'<span class="novo">Novo</span>':''}</div>
          <h2>${dest.t}</h2>
          <p>${dest.desc}</p>
          <div class="info"><span>${dest.dur}</span> · <span>${dest.area}</span></div>
        </div>
      </div>`;
      fe.querySelector('.featured').onclick = () => abrir(dest);
    } else { fe.style.display = 'none'; fe.innerHTML=''; }

    // grid
    $('contador').textContent = `${lista.length} ${lista.length===1?'vídeo':'vídeos'}`;
    const g = $('grid');
    if (!lista.length) { g.innerHTML = `<div class="empty">Nenhum treinamento encontrado.</div>`; return; }
    g.innerHTML = '';
    lista.forEach(v => {
      const el = document.createElement('div');
      el.className = 'vcard';
      el.innerHTML = `${thumb(v)}
        <div class="vbody">
          <h3>${v.t}</h3>
          <div class="vmeta"><span class="area">${v.area}</span> · <span>${v.dur}</span> ${v.novo?'<span class="novo">Novo</span>':''}</div>
        </div>`;
      el.onclick = () => abrir(v);
      g.appendChild(el);
    });
  }

  function abrir(v) {
    const c = CAT[v.cat];
    $('stage').style.background = c.grad;
    $('ptags').innerHTML = `<span class="tag" style="background:${c.cor}">${c.label}</span>${v.novo?'<span class="novo">Novo</span>':''}`;
    $('ptitle').textContent = v.t;
    $('pdesc').textContent = v.desc;
    $('ptotal').textContent = v.dur;
    $('pinfo').innerHTML = `<span>Duração: <b>${v.dur}</b></span><span>Área: <b>${v.area}</b></span><span>Categoria: <b>${c.label}</b></span>`;
    $('overlay').classList.add('open');
  }
  function fechar() { $('overlay').classList.remove('open'); }
  $('closeX').onclick = fechar;
  $('overlay').onclick = e => { if (e.target === $('overlay')) fechar(); };
  document.addEventListener('keydown', e => { if (e.key === 'Escape') fechar(); });

  $('q').addEventListener('input', e => { q = e.target.value; render(); });
  render();
</script>
</body>
</html>
